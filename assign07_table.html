<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign07-Table</title>
    <style>
        table, th, td {border: 1px solid #682603; border-collapse: collapse; width: 100%;}
        th, td{ padding: 10px; width: 30%; text-align: center;}
        .main-heading {background-color: #983907; color:#ffa310 ; font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 20px;}
        .sub-heading {background-color: #1d0a00; color:#ffa310 ; font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 15px;}
        td {background-color: #f8c26c; color: #983907;}
    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="3" class="main-heading">Fruits and Vegetables</th>
        </tr>
        <tr class="sub-heading">
            <th>Name</th>
            <th>Picture</th>
            <th>Fruit/Vegetable</th>
        </tr>
        <tr>
            <td>Apple</td>
            <td><img src="images/apple.png" alt="Apple"></td>
            <td>Fruit</td>
        </tr>
            <td>Onion</td>
            <td><img src="images/onion.png" alt="Apple"></td>
            <td>Vegetable</td>
        </tr>
        <tr>
            <td>Grapes</td>
            <td><img src="images/grapes.png" alt="Apple"></td>
            <td>Fruit</td>
        </tr>
    </table>
</body>
</html>
