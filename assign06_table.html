<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table and its Atributes</title>
    <style>
        table, th, td {border: 1px solid white; border-collapse: collapse; width: 300px;}
        th {padding: 15px;background-color: brown; color: darkorange;}
        td {padding: 10px;background-color: coral; color: darkgreen; text-align: center;}
    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="3">Employee Data</th>
        </tr>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Salary</th>
        </tr>
        <tr>
            <td style="text-align: left;">Akhil</td>
            <td>28</td>
            <td style="text-align: right;">35,000.00</td>
        </tr>
        <tr>
            <td style="text-align: left;">John</td>
            <td>32</td>
            <td style="text-align: right;">48,000.00</td>
        <tr>
            <td style="text-align: left;">Ashfaq</td>
            <td>30</td>
            <td style="text-align: right;">40,000.00</td>
        </tr>
    </table>
</body>
</html>
